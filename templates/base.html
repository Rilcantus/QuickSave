<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}QuickSave{% endblock %}</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <!-- Tailwind config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0fdf4',
              100: '#dcfce7',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  {% block extra_head %}{% endblock %}
</head>

<body class="h-full font-sans text-gray-100 bg-gray-950" hx-boost="true">

  <!-- Navbar -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 flex items-center justify-between h-14">

      <!-- Logo -->
      <a href="/" class="text-brand-400 font-bold text-xl tracking-tight">
        💾 QuickSave
      </a>

      <!-- Nav links -->
      <div class="flex items-center gap-6 text-sm font-medium text-gray-400">
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}" class="hover:text-white transition">Dashboard</a>
          <a href="{% url 'game_list' %}" class="hover:text-white transition">Games</a>
          <a href="{% url 'journal_list' %}" class="hover:text-white transition">Journal</a>
          <form method="POST" action="{% url 'logout' %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="hover:text-brand-400 transition">Log out</button>
          </form>
        {% else %}
          <a href="/accounts/login/" class="hover:text-white transition">Log in</a>
          <a href="/accounts/register/" class="bg-brand-500 text-white px-4 py-1.5 rounded-lg hover:bg-brand-600 transition">Sign up</a>
        {% endif %}
      </div>

    </div>
  </nav>

  <!-- Flash messages -->
  {% if messages %}
    <div class="max-w-5xl mx-auto px-4 mt-4 space-y-2">
      {% for message in messages %}
        <div class="rounded-lg px-4 py-3 text-sm font-medium
          {% if message.tags == 'error' %}bg-red-900 text-red-200
          {% elif message.tags == 'success' %}bg-green-900 text-green-200
          {% else %}bg-gray-800 text-gray-200{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <!-- Page content -->
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
