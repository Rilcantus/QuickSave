{% extends "base.html" %}

{% block title %}{{ action }} — QuickSave{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-6">

  <div class="mb-8">
    <h1 class="text-2xl font-bold text-white">{{ action }}</h1>
  </div>

  <div class="bg-gray-900 rounded-2xl border border-gray-800 p-8">
    <form method="POST" class="space-y-5">
      {% csrf_token %}

      {% for field in form %}
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">
            {{ field.label }}
          </label>
          <input
            type="{{ field.field.widget.input_type }}"
            name="{{ field.html_name }}"
            id="{{ field.id_for_label }}"
            value="{{ field.value|default:'' }}"
            placeholder="{{ field.field.widget.attrs.placeholder|default:'' }}"
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition"
          />
          {% if field.errors %}
            {% for error in field.errors %}
              <p class="text-red-400 text-xs mt-1">{{ error }}</p>
            {% endfor %}
          {% endif %}
        </div>
      {% endfor %}

      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-semibold py-2.5 rounded-lg transition">
          {{ action }}
        </button>
        <a href="{% if game %}{% url 'game_detail' game.pk %}{% else %}{% url 'game_list' %}{% endif %}"
           class="flex-1 text-center bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-2.5 rounded-lg transition">
          Cancel
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
