{% extends "base.html" %}

{% block title %}Start Session — {{ game.title }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto mt-6">

  <p class="text-gray-500 text-sm mb-1">
    <a href="{% url 'game_list' %}" class="hover:text-brand-400 transition">My Games</a>
    <span class="mx-2">›</span>
    <a href="{% url 'game_detail' game.pk %}" class="hover:text-brand-400 transition">{{ game.title }}</a>
    <span class="mx-2">›</span>
    Start Session
  </p>

  <h1 class="text-2xl font-bold text-white mt-2 mb-8">Start a Session</h1>

  <div class="bg-gray-900 rounded-2xl border border-gray-800 p-8">
    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <!-- Descriptor dropdown -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">
          Run Label <span class="text-gray-600 font-normal">(optional)</span>
        </label>
        <select name="descriptor"
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-brand-500 transition">
          <option value="">No run label</option>
          {% for descriptor in form.fields.descriptor.queryset %}
            <option value="{{ descriptor.pk }}">{{ descriptor.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- New descriptor -->
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">
          Or create a new run label
        </label>
        <input
          type="text"
          name="new_descriptor"
          placeholder="e.g. Modded Run, STR Build, Ranked..."
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 transition"
        />
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3 rounded-lg transition text-lg">
          ▶ Start Session
        </button>
        <a href="{% url 'game_detail' game.pk %}"
           class="flex-1 text-center bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-3 rounded-lg transition">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
